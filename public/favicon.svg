<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black background circle -->
  <circle cx="50" cy="50" r="50" fill="#000000"/>

  <!-- Head shape -->
  <ellipse cx="50" cy="45" rx="30" ry="35" fill="#111111"/>

  <!-- Left eye -->
  <ellipse cx="35" cy="38" rx="10" ry="8" fill="white"/>
  <ellipse cx="35" cy="38" rx="6" ry="5" fill="#cccccc"/>

  <!-- Right eye -->
  <ellipse cx="65" cy="38" rx="10" ry="8" fill="white"/>
  <ellipse cx="65" cy="38" rx="6" ry="5" fill="#cccccc"/>

  <!-- Wide grin -->
  <path d="M 22 60 Q 50 80 78 60" stroke="white" stroke-width="3" fill="none"/>

  <!-- Teeth -->
  <polygon points="28,62 33,72 38,62" fill="white"/>
  <polygon points="38,65 43,76 48,65" fill="white"/>
  <polygon points="48,67 53,78 58,67" fill="white"/>
  <polygon points="58,65 63,76 68,65" fill="white"/>
  <polygon points="68,62 73,72 78,62" fill="white"/>

  <!-- Tongue -->
  <ellipse cx="50" cy="80" rx="8" ry="6" fill="#cc0000"/>
  <line x1="50" y1="74" x2="50" y2="86" stroke="#990000" stroke-width="2"/>
</svg>